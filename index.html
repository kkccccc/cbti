<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>酒品MBTI — 你是哪杯酒？</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:           #09060f;
      --surface:      rgba(255,255,255,0.05);
      --surface-hi:   rgba(255,255,255,0.09);
      --border:       rgba(255,255,255,0.1);
      --border-gold:  rgba(210,160,80,0.55);
      --gold:         #d4a85c;
      --gold-hi:      #edc97a;
      --gold-dim:     #a07840;
      --purple:       #a07fd4;
      --purple-dim:   #7b5faa;
      --text:         #efe6d4;
      --text-2:       rgba(239,230,212,0.55);
      --text-3:       rgba(239,230,212,0.28);
      --grad-gold:    linear-gradient(135deg, #f0d898, #d4a85c);
      --grad-cta:     linear-gradient(135deg, #c88a48, #9b72cf);
      --r-lg: 22px;
      --r-md: 16px;
      --r-sm: 12px;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 70% 55% at 8% 8%,   rgba(110,70,200,0.22) 0%, transparent 60%),
        radial-gradient(ellipse 55% 45% at 92% 92%, rgba(190,120,50,0.16) 0%, transparent 60%),
        radial-gradient(ellipse 45% 65% at 50% 50%, rgba(70,30,140,0.1)  0%, transparent 70%);
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", "Helvetica Neue", sans-serif;
      color: var(--text);
      display: flex;
      justify-content: center;
      overflow-x: hidden;
    }

    #app {
      width: 100%;
      max-width: 480px;
      position: relative;
      height: 100%;
    }

    /* ── Screens ── */
    .screen {
      position: absolute;
      inset: 0;
      padding: 48px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transform: translateY(18px);
      transition: opacity 0.38s ease, transform 0.38s ease;
    }
    .screen.active {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }
    #screen-result {
      justify-content: flex-start;
      padding-top: 36px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    #screen-result::-webkit-scrollbar { display: none; }

    /* ── Card ── */
    .card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 36px 28px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }

    /* ── Typography ── */
    .eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 14px;
    }
    .display {
      font-size: 38px;
      font-weight: 800;
      line-height: 1.15;
      background: var(--grad-gold);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }
    .body-md {
      font-size: 15px;
      line-height: 1.85;
      color: var(--text-2);
    }

    /* ── Buttons ── */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 17px 24px;
      border-radius: var(--r-md);
      border: none;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: filter 0.2s, transform 0.15s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .btn:active { transform: scale(0.97); }

    .btn-cta {
      background: var(--grad-cta);
      color: #fff;
      box-shadow: 0 8px 28px rgba(140,100,210,0.28);
    }
    .btn-cta:hover { filter: brightness(1.08); box-shadow: 0 10px 36px rgba(140,100,210,0.38); }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-2);
      margin-top: 12px;
      font-size: 14px;
    }
    .btn-ghost:hover { border-color: var(--gold-dim); color: var(--text); }

    /* ── Landing ── */
    .hero-icon {
      font-size: 68px;
      display: block;
      text-align: center;
      margin-bottom: 28px;
      filter: drop-shadow(0 0 24px rgba(212,168,92,0.45));
    }
    .hero-desc { margin-bottom: 28px; }
    .meta-row {
      display: flex;
      gap: 0;
      margin-top: 18px;
    }
    .meta-row span {
      flex: 1;
      text-align: center;
      font-size: 12px;
      color: var(--text-3);
      border-right: 1px solid var(--border);
      padding: 0 4px;
    }
    .meta-row span:last-child { border-right: none; }

    /* ── Progress ── */
    .progress-wrap { width: 100%; margin-bottom: 18px; }
    .progress-top {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--text-2);
      margin-bottom: 10px;
    }
    .progress-track {
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--grad-cta);
      border-radius: 2px;
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    }

    /* ── Options ── */
    .question {
      font-size: 19px;
      font-weight: 600;
      line-height: 1.6;
      color: var(--text);
      margin-bottom: 28px;
    }
    .opt {
      display: block;
      width: 100%;
      padding: 15px 40px 15px 18px;
      border-radius: var(--r-md);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 14px;
      line-height: 1.55;
      text-align: left;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, opacity 0.25s, transform 0.15s;
      margin-bottom: 10px;
      position: relative;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .opt:last-of-type { margin-bottom: 0; }
    .opt:hover { border-color: var(--gold-dim); background: rgba(212,168,92,0.06); }
    .opt:active { transform: scale(0.99); }
    .opt.selected {
      border-color: var(--gold);
      background: rgba(212,168,92,0.12);
      pointer-events: none;
    }
    .opt.selected::after {
      content: '✓';
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gold);
      font-size: 14px;
      font-weight: 700;
    }
    .opt.fade-out { opacity: 0.25; pointer-events: none; }

    /* ── Loading ── */
    .loading-wrap { text-align: center; }
    .loading-icon {
      font-size: 60px;
      display: block;
      margin-bottom: 24px;
      animation: float 2.2s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0) rotate(-4deg); }
      50%      { transform: translateY(-12px) rotate(4deg); }
    }
    .loading-label {
      font-size: 16px;
      color: var(--text-2);
      animation: breathe 1.8s ease-in-out infinite;
    }
    @keyframes breathe {
      0%,100% { opacity: 0.35; }
      50%      { opacity: 1; }
    }
    .loading-dots::after {
      content: '';
      animation: dot3 1.8s steps(4,end) infinite;
    }
    @keyframes dot3 {
      0%  { content: ''; }
      25% { content: '·'; }
      50% { content: '··'; }
      75% { content: '···'; }
    }

    /* ── Result ── */
    /* ── Result page ── */
    .r-hero {
      text-align: center;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .r-icon {
      font-size: 64px;
      display: block;
      margin-bottom: 14px;
      filter: drop-shadow(0 0 20px rgba(212,168,92,0.35));
    }
    .r-en {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 4px;
      text-transform: uppercase;
      background: var(--grad-gold);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }
    .r-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0;
    }
    /* section label with left bar */
    .sec-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-2);
      letter-spacing: 1px;
      margin-bottom: 12px;
    }
    .sec-label::before {
      content: '';
      display: block;
      width: 3px;
      height: 14px;
      background: var(--grad-cta);
      border-radius: 2px;
      flex-shrink: 0;
    }
    .r-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
    }
    .tag {
      padding: 6px 14px;
      border-radius: 20px;
      background: rgba(160,127,212,0.1);
      border: 1px solid rgba(160,127,212,0.25);
      font-size: 12px;
      font-weight: 500;
      color: var(--purple);
    }
    /* quote box */
    .r-quote {
      border-left: 3px solid var(--gold-dim);
      padding: 14px 16px;
      background: rgba(212,168,92,0.06);
      border-radius: 0 var(--r-sm) var(--r-sm) 0;
      font-size: 15px;
      color: var(--text-2);
      line-height: 1.7;
      margin-bottom: 24px;
      font-style: italic;
    }
    /* quick review accent card */
    .r-quick {
      background: rgba(160,127,212,0.1);
      border: 1px solid rgba(160,127,212,0.2);
      border-radius: var(--r-md);
      padding: 16px 18px;
      font-size: 14px;
      line-height: 1.85;
      color: var(--text);
      margin-bottom: 24px;
    }
    .r-desc {
      font-size: 15px;
      line-height: 2;
      color: var(--text-2);
      margin-bottom: 0;
    }
    .divider { height: 1px; background: var(--border); margin: 24px 0; }
    /* sub-indices */
    .r-indices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    .r-index-cell {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 16px 14px;
      text-align: center;
    }
    .r-index-lbl {
      font-size: 11px;
      color: var(--text-3);
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .r-index-num {
      font-size: 36px;
      font-weight: 900;
      background: var(--grad-cta);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 8px;
    }
    .r-index-desc {
      font-size: 11px;
      color: var(--text-3);
      line-height: 1.5;
    }
    /* radar chart */
    .r-radar-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }
    /* compatible type */
    .r-compat {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 16px 18px;
      margin-bottom: 24px;
    }
    .r-compat-icon { font-size: 36px; flex-shrink: 0; }
    .r-compat-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .r-compat-sub {
      font-size: 12px;
      color: var(--text-3);
      line-height: 1.6;
    }
    /* scenario */
    .r-scenario {
      background: rgba(212,168,92,0.05);
      border: 1px solid rgba(212,168,92,0.15);
      border-radius: var(--r-md);
      padding: 16px 18px;
      font-size: 14px;
      color: var(--text-2);
      line-height: 1.85;
      margin-bottom: 24px;
    }
    /* share */
    .share-lbl {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 10px;
    }
    .share-box {
      background: rgba(255,255,255,0.025);
      border: 1px dashed rgba(255,255,255,0.1);
      border-radius: var(--r-sm);
      padding: 18px;
      font-size: 14px;
      line-height: 1.9;
      color: var(--text-2);
      white-space: pre-line;
      user-select: text;
      -webkit-user-select: text;
      margin-bottom: 20px;
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    .btn-row .btn { margin-bottom: 0; }

    @media (max-width: 390px) {
      .card      { padding: 28px 18px; }
      .display   { font-size: 32px; }
      .question  { font-size: 17px; }
      .r-en      { font-size: 26px; }
      .opt       { font-size: 14px; padding: 16px 40px 16px 18px; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ══ 首页 ══ -->
  <div id="screen-landing" class="screen active">
    <span class="hero-icon">🍷</span>
    <div class="card">
      <div class="eyebrow">酒品人格测试</div>
      <div class="display">你是哪杯酒？</div>
      <div class="hero-desc">
        <p class="body-md">12 个问题，找到属于你的那瓶微醺。每杯酒都有自己的性格，就像你一样。</p>
        <p class="body-md" style="margin-top:10px;margin-bottom:0;">无需注册，测完即得，可分享给朋友对比。</p>
      </div>
      <button class="btn btn-cta" onclick="startQuiz()">开始调酒 →</button>
      <div class="meta-row">
        <span>共 12 题</span>
        <span>约 2 分钟</span>
        <span>16 种结果</span>
      </div>
    </div>
  </div>

  <!-- ══ 答题 ══ -->
  <div id="screen-quiz" class="screen">
    <div class="progress-wrap">
      <div class="progress-top">
        <span id="prog-num">1 / 12</span>
        <span id="prog-pct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="prog-bar" style="width:0%"></div>
      </div>
    </div>
    <div class="card">
      <p class="question" id="q-text"></p>
      <button class="opt" id="opt-0" onclick="pick(0)"></button>
      <button class="opt" id="opt-1" onclick="pick(1)"></button>
      <button class="opt" id="opt-2" onclick="pick(2)"></button>
      <button class="opt" id="opt-3" onclick="pick(3)"></button>
    </div>
  </div>

  <!-- ══ 过渡 ══ -->
  <div id="screen-loading" class="screen">
    <div class="loading-wrap">
      <span class="loading-icon">🍸</span>
      <p class="loading-label">正在为你调制专属酒单<span class="loading-dots"></span></p>
    </div>
  </div>

  <!-- ══ 结果 ══ -->
  <div id="screen-result" class="screen">
    <div class="card">

      <!-- 顶部酒品身份 -->
      <div class="r-hero">
        <span class="r-icon" id="r-icon">🍷</span>
        <div class="r-en"    id="r-en">MOJITO</div>
        <div class="r-title" id="r-title">莫吉托</div>
      </div>

      <!-- 标签 -->
      <div class="sec-label">气质标签</div>
      <div class="r-tags" id="r-tags"></div>

      <!-- 一句话引言 -->
      <div class="r-quote" id="r-quote"></div>

      <!-- 速评 -->
      <div class="sec-label">酒品速评</div>
      <div class="r-quick" id="r-quick"></div>

      <div class="divider"></div>

      <!-- 人格解读 -->
      <div class="sec-label">人格解读</div>
      <p class="r-desc" id="r-desc"></p>

      <div class="divider"></div>

      <!-- 两个副指数 -->
      <div class="sec-label">你的两个指数</div>
      <div class="r-indices">
        <div class="r-index-cell">
          <div class="r-index-lbl">外放度</div>
          <div class="r-index-num" id="r-ext">—</div>
          <div class="r-index-desc" id="r-ext-desc"></div>
        </div>
        <div class="r-index-cell">
          <div class="r-index-lbl">感性度</div>
          <div class="r-index-num" id="r-sen">—</div>
          <div class="r-index-desc" id="r-sen-desc"></div>
        </div>
      </div>

      <!-- 酒感雷达图 -->
      <div class="sec-label">酒感雷达</div>
      <div class="r-radar-wrap">
        <canvas id="r-radar" width="240" height="240"></canvas>
      </div>

      <div class="divider"></div>

      <!-- 搭子酒 -->
      <div class="sec-label">你的搭子酒</div>
      <div class="r-compat">
        <span class="r-compat-icon" id="r-compat-icon">🥂</span>
        <div>
          <div class="r-compat-title" id="r-compat-name"></div>
          <div class="r-compat-sub"  id="r-compat-why"></div>
        </div>
      </div>

      <!-- 典型场景 -->
      <div class="sec-label">典型场景</div>
      <div class="r-scenario" id="r-scenario"></div>

      <div class="divider"></div>

      <!-- 分享 -->
      <div class="share-lbl">分享文案</div>
      <div class="share-box" id="r-share"></div>
      <div class="btn-row">
        <button class="btn btn-ghost" id="btn-save"  onclick="saveImage()">保存结果图片</button>
        <button class="btn btn-ghost" id="btn-share" onclick="shareTest()">分享给朋友</button>
      </div>
      <button class="btn btn-cta"   id="btn-copy"  onclick="copyShare()">复制分享文案</button>
      <button class="btn btn-ghost" onclick="resetQuiz()">重新测试</button>
    </div>
  </div>

</div>
<script>
/* ─────────────────────────────────────────
   题目数据  12 道（每题四选一）
───────────────────────────────────────── */
const QS = [
  {
    q: "在一场只认识两三个人的酒局上，你会：",
    opts: [
      { t: "很快找到话题，跟全桌新朋友喝成一片",       v: "E" },
      { t: "主动介绍自己，但还是主要跟认识的人待着",   v: "E" },
      { t: "笑着附和，等别人先开口再慢慢融入",         v: "I" },
      { t: "专注喝酒，除非对方主动来聊才回应",         v: "I" }
    ]
  },
  {
    q: "酒单上有一款完全没喝过的特调，你会：",
    opts: [
      { t: "先问清楚基酒是什么、甜不甜、度数多少",     v: "S" },
      { t: "看配料表，选口感最接近自己熟悉的那种",     v: "S" },
      { t: "被名字吸引，脑子里开始想象喝起来的感觉",   v: "N" },
      { t: "听起来有故事感就点了，味道是其次",         v: "N" }
    ]
  },
  {
    q: "朋友在酒桌上突然情绪低落，你第一反应是：",
    opts: [
      { t: "帮他梳理一下到底是什么让他难受，理清楚再说", v: "T" },
      { t: "觉得他可能想多了，想办法帮他转移注意力",    v: "T" },
      { t: "安静陪着他，让他先把所有感受说完",          v: "F" },
      { t: "立刻感同身受，恨不得比他更难过",            v: "F" }
    ]
  },
  {
    q: "约好周五晚上出去喝，你通常是：",
    opts: [
      { t: "提前选好地方、确认人数、想好喝什么风格",   v: "J" },
      { t: "提前查几个备选，保证不会扑空就放心了",     v: "J" },
      { t: "当天再看心情决定去哪，随缘走到哪算哪",     v: "P" },
      { t: "计划随时可以推翻，越临时越有意思",         v: "P" }
    ]
  },
  {
    q: "喝到微醺，你会变成：",
    opts: [
      { t: "更能说话，开始跟所有人称兄道弟",                 v: "E" },
      { t: "聊嗨了停不下来，恨不得把所有想法全说出来",       v: "E" },
      { t: "话反而变少，沉浸在自己的感觉里",                 v: "I" },
      { t: "只想找一个人安静聊，或者干脆先回家",             v: "I" }
    ]
  },
  {
    q: "形容一杯让你惊艳的酒，你会说：",
    opts: [
      { t: "「果香很重，有点像荔枝，回口带一点甜」",         v: "S" },
      { t: "「入口顺，酸甜比例刚好，尾段微微有涩感」",       v: "S" },
      { t: "「喝起来像某个夏天，说不清楚，就是那种感觉」",   v: "N" },
      { t: "「像一个人，有点难懂，但喝进去就全明白了」",     v: "N" }
    ]

/* ─────────────────────────────────────────
   State
───────────────────────────────────────── */
let idx    = 0;
let scores = {};
let locked = false;

/* ─────────────────────────────────────────
   Screen helper
───────────────────────────────────────── */
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  el.classList.add('active');
  el.scrollTop = 0;
}

/* ─────────────────────────────────────────
   Quiz
───────────────────────────────────────── */
function startQuiz() {
  idx    = 0;
  scores = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };
  locked = false;
  renderQ();
  show('screen-quiz');
}

function renderQ() {
  const q   = QS[idx];
  const tot = QS.length;
  const pct = Math.round((idx / tot) * 100);

  document.getElementById('q-text').textContent   = q.q;
  q.opts.forEach((o, i) => {
    document.getElementById(`opt-${i}`).textContent = o.t;
  });
  document.getElementById('prog-num').textContent  = `${idx + 1} / ${tot}`;
  document.getElementById('prog-pct').textContent  = `${pct}%`;
  document.getElementById('prog-bar').style.width  = `${pct}%`;

  ['opt-0','opt-1','opt-2','opt-3'].forEach(id => {
    document.getElementById(id).classList.remove('selected','fade-out');
  });
  locked = false;
}

function pick(i) {
  if (locked) return;
  locked = true;

  document.getElementById(`opt-${i}`).classList.add('selected');
  ['opt-0','opt-1','opt-2','opt-3'].forEach((id, j) => {
    if (j !== i) document.getElementById(id).classList.add('fade-out');
  });

  scores[QS[idx].opts[i].v]++;

  setTimeout(() => {
    idx++;
    if (idx >= QS.length) {
      show('screen-loading');
      setTimeout(() => {
        const type = calcType();
        renderResult(type);
        show('screen-result');
      }, 2100);
    } else {
      renderQ();
    }
  }, 390);
}

/* ─────────────────────────────────────────
   MBTI calc  — tie goes to first letter (E/S/T/J)
───────────────────────────────────────── */
function calcType() {
  return (scores.E >= scores.I ? 'E' : 'I')
       + (scores.S >= scores.N ? 'S' : 'N')
       + (scores.T >= scores.F ? 'T' : 'F')
       + (scores.J >= scores.P ? 'J' : 'P');
}

/* ─────────────────────────────────────────
   Result render
───────────────────────────────────────── */
function renderResult(type) {
  const d = RS[type] || RS['ENFP'];

  document.getElementById('r-icon').textContent  = d.icon;
  document.getElementById('r-en').textContent    = d.en;
  document.getElementById('r-title').textContent = d.title;
  document.getElementById('r-quote').textContent = d.quote;
  document.getElementById('r-quick').textContent = d.quick;
  document.getElementById('r-desc').textContent  = d.desc;
  document.getElementById('r-share').textContent = d.share;

  document.getElementById('r-compat-icon').textContent = d.compat.icon;
  document.getElementById('r-compat-name').textContent = d.compat.name;
  document.getElementById('r-compat-why').textContent  = d.compat.why;
  document.getElementById('r-scenario').textContent    = d.scenario;

  const tagsEl = document.getElementById('r-tags');
  tagsEl.innerHTML = '';
  d.tags.forEach(t => {
    const s = document.createElement('span');
    s.className   = 'tag';
    s.textContent = t;
    tagsEl.appendChild(s);
  });

  const extPct = Math.round(scores.E / 3 * 100);
  const senPct = Math.round(scores.F / 3 * 100);
  document.getElementById('r-ext').textContent      = extPct + '%';
  document.getElementById('r-ext-desc').textContent = extPct >= 60 ? '喜欢热闹，能量来自人群' : extPct >= 40 ? '内外均衡，看情况切换' : '享受独处，独处充电';
  document.getElementById('r-sen').textContent      = senPct + '%';
  document.getElementById('r-sen-desc').textContent = senPct >= 60 ? '感性优先，情绪是罗盘' : senPct >= 40 ? '情理兼顾，随机应变' : '理性主导，逻辑先行';

  document.getElementById('btn-copy').textContent = '复制分享文案';
  setTimeout(() => drawRadar(d.flavor), 50);
}

/* ─────────────────────────────────────────
   Radar chart — 6 axes: 气泡感/果香/甜度/苦涩/烈度/顺滑
───────────────────────────────────────── */
function drawRadar(vals) {
  const canvas = document.getElementById('r-radar');
  if (!canvas) return;
  const ctx  = canvas.getContext('2d');
  const W    = canvas.width;
  const H    = canvas.height;
  const cx   = W / 2;
  const cy   = H / 2;
  const R    = Math.min(W, H) * 0.36;
  const n    = 6;
  const lbls = ['气泡感','果香','甜度','苦涩','烈度','顺滑'];

  ctx.clearRect(0, 0, W, H);

  const angle = i => (Math.PI * 2 / n) * i - Math.PI / 2;
  const pt    = (i, r) => ({
    x: cx + r * Math.cos(angle(i)),
    y: cy + r * Math.sin(angle(i))
  });

  // grid rings
  [0.25, 0.5, 0.75, 1].forEach(f => {
    ctx.beginPath();
    for (let i = 0; i < n; i++) {
      const p = pt(i, R * f);
      i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
    }
    ctx.closePath();
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth   = 1;
    ctx.stroke();
  });

  // spokes
  for (let i = 0; i < n; i++) {
    const p = pt(i, R);
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(p.x, p.y);
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth   = 1;
    ctx.stroke();
  }

  // data fill
  ctx.beginPath();
  for (let i = 0; i < n; i++) {
    const r = R * (vals[i] / 100);
    const p = pt(i, r);
    i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
  }
  ctx.closePath();
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, R);
  grad.addColorStop(0, 'rgba(160,127,212,0.6)');
  grad.addColorStop(1, 'rgba(212,168,92,0.35)');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = '#d4a85c';
  ctx.lineWidth   = 1.5;
  ctx.stroke();

  // labels
  ctx.font      = '11px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (let i = 0; i < n; i++) {
    const p = pt(i, R + 18);
    ctx.fillText(lbls[i], p.x, p.y);
  }
}

/* ─────────────────────────────────────────
   Copy share text
───────────────────────────────────────── */
function copyShare() {
  const text = document.getElementById('r-share').textContent;
  const btn  = document.getElementById('btn-copy');

  const done = () => {
    btn.textContent = '已复制 ✓';
    setTimeout(() => { btn.textContent = '复制分享文案'; }, 2500);
  };

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(done).catch(() => legacyCopy(text, done));
  } else {
    legacyCopy(text, done);
  }
}

function legacyCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none;';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); cb(); } catch(e) {
    document.getElementById('btn-copy').textContent = '请手动复制';
  }
  document.body.removeChild(ta);
}

/* ─────────────────────────────────────────
   Save result as image
───────────────────────────────────────── */
function saveImage() {
  const btn = document.getElementById('btn-save');
  btn.textContent = '生成中…';
  btn.disabled = true;

  const icon  = document.getElementById('r-icon').textContent;
  const en    = document.getElementById('r-en').textContent;
  const title = document.getElementById('r-title').textContent;
  const quote = document.getElementById('r-quote').textContent;
  const quick = document.getElementById('r-quick').textContent;
  const tags  = Array.from(document.getElementById('r-tags').children).map(s => s.textContent);

  const W = 640, H = 900;
  const cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  const c = cv.getContext('2d');

  // background gradient
  const bg = c.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, '#09060f');
  bg.addColorStop(1, '#180f30');
  c.fillStyle = bg;
  c.fillRect(0, 0, W, H);

  // subtle noise texture via tiny pattern
  c.fillStyle = 'rgba(255,255,255,0.012)';
  for (let i = 0; i < W; i += 4) for (let j = 0; j < H; j += 4) {
    if (Math.random() > 0.6) c.fillRect(i, j, 2, 2);
  }

  // top gold border strip
  const strip = c.createLinearGradient(0, 0, W, 0);
  strip.addColorStop(0,   'transparent');
  strip.addColorStop(0.3, '#d4a85c');
  strip.addColorStop(0.7, '#d4a85c');
  strip.addColorStop(1,   'transparent');
  c.fillStyle = strip;
  c.fillRect(0, 0, W, 2);

  // card background
  c.save();
  roundRect(c, 40, 40, W - 80, H - 80, 24);
  c.fillStyle = 'rgba(255,255,255,0.045)';
  c.fill();
  c.strokeStyle = 'rgba(212,168,92,0.25)';
  c.lineWidth = 1;
  c.stroke();
  c.restore();

  // icon
  c.font = '72px serif';
  c.textAlign = 'center';
  c.fillStyle = '#ffffff';
  c.fillText(icon, W / 2, 160);

  // EN name
  c.font = 'bold 22px sans-serif';
  c.fillStyle = '#d4a85c';
  c.letterSpacing = '4px';
  c.fillText(en, W / 2, 210);
  c.letterSpacing = '0px';

  // Chinese title
  c.font = 'bold 44px sans-serif';
  c.fillStyle = '#ffffff';
  c.fillText(title, W / 2, 272);

  // divider
  const div = c.createLinearGradient(160, 0, W - 160, 0);
  div.addColorStop(0, 'transparent');
  div.addColorStop(0.5, 'rgba(212,168,92,0.6)');
  div.addColorStop(1, 'transparent');
  c.strokeStyle = div;
  c.lineWidth = 1;
  c.beginPath();
  c.moveTo(160, 298);
  c.lineTo(W - 160, 298);
  c.stroke();

  // quote
  c.font = 'italic 18px sans-serif';
  c.fillStyle = 'rgba(255,255,255,0.65)';
  c.fillText(quote, W / 2, 340);

  // quick review box
  c.save();
  roundRect(c, 80, 365, W - 160, 52, 12);
  c.fillStyle = 'rgba(160,127,212,0.18)';
  c.fill();
  c.restore();
  c.font = '15px sans-serif';
  c.fillStyle = '#c0a0e8';
  c.fillText(quick, W / 2, 396);

  // tags
  let tx = W / 2 - (tags.join('  ').length * 7) / 2;
  c.font = '14px sans-serif';
  tags.forEach(tag => {
    const tw = c.measureText(tag).width + 24;
    c.save();
    roundRect(c, tx, 438, tw, 30, 8);
    c.fillStyle = 'rgba(212,168,92,0.15)';
    c.fill();
    c.strokeStyle = 'rgba(212,168,92,0.4)';
    c.lineWidth = 1;
    c.stroke();
    c.restore();
    c.fillStyle = '#d4a85c';
    c.textAlign = 'left';
    c.fillText(tag, tx + 12, 458);
    tx += tw + 10;
  });
  c.textAlign = 'center';

  // radar chart copy
  const radarSrc = document.getElementById('r-radar');
  c.drawImage(radarSrc, (W - 200) / 2, 488, 200, 200);

  // bottom watermark
  c.font = '13px sans-serif';
  c.fillStyle = 'rgba(255,255,255,0.25)';
  c.fillText('酒品人格测试  ·  你是哪杯酒？', W / 2, H - 68);
  c.font = '11px sans-serif';
  c.fillStyle = 'rgba(255,255,255,0.15)';
  c.fillText('扫码测测你是哪杯酒 →', W / 2, H - 48);

  cv.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `酒品人格-${title}.png`;
    a.click();
    URL.revokeObjectURL(url);
    btn.textContent = '已保存 ✓';
    btn.disabled = false;
    setTimeout(() => { btn.textContent = '保存结果图片'; }, 2500);
  }, 'image/png');
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

/* ─────────────────────────────────────────
   Share test link
───────────────────────────────────────── */
function shareTest() {
  const title = document.getElementById('r-title').textContent;
  const shareText = document.getElementById('r-share').textContent;
  const shareData = {
    title: '酒品人格测试 — 你是哪杯酒？',
    text:  shareText,
  };

  const btn = document.getElementById('btn-share');
  const done = () => {
    btn.textContent = '已复制链接 ✓';
    btn.disabled = false;
    setTimeout(() => { btn.textContent = '分享给朋友'; }, 2500);
  };

  if (navigator.share) {
    navigator.share(shareData).then(() => {
      btn.textContent = '已分享 ✓';
      btn.disabled = false;
      setTimeout(() => { btn.textContent = '分享给朋友'; }, 2500);
    }).catch(() => {});
  } else {
    // fallback: copy share text + page URL
    const text = shareText + '\n' + location.href;
    btn.disabled = true;
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(text).then(done).catch(() => legacyCopy(text, done));
    } else {
      legacyCopy(text, done);
    }
  }
}
