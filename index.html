<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>酒品MBTI — 你是哪杯酒？</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:           #09060f;
      --surface:      rgba(255,255,255,0.05);
      --surface-hi:   rgba(255,255,255,0.09);
      --border:       rgba(255,255,255,0.1);
      --border-gold:  rgba(210,160,80,0.55);
      --gold:         #d4a85c;
      --gold-hi:      #edc97a;
      --gold-dim:     #a07840;
      --purple:       #a07fd4;
      --purple-dim:   #7b5faa;
      --text:         #efe6d4;
      --text-2:       rgba(239,230,212,0.55);
      --text-3:       rgba(239,230,212,0.28);
      --grad-gold:    linear-gradient(135deg, #f0d898, #d4a85c);
      --grad-cta:     linear-gradient(135deg, #c88a48, #9b72cf);
      --r-lg: 22px;
      --r-md: 16px;
      --r-sm: 12px;
    }

    html { -webkit-text-size-adjust: 100%; }

    body {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 70% 55% at 8% 8%,   rgba(110,70,200,0.22) 0%, transparent 60%),
        radial-gradient(ellipse 55% 45% at 92% 92%, rgba(190,120,50,0.16) 0%, transparent 60%),
        radial-gradient(ellipse 45% 65% at 50% 50%, rgba(70,30,140,0.1)  0%, transparent 70%);
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", "Helvetica Neue", sans-serif;
      color: var(--text);
      display: flex;
      justify-content: center;
      overflow-x: hidden;
    }

    #app {
      width: 100%;
      max-width: 480px;
      position: relative;
      min-height: 100vh;
    }

    /* ── Screens ── */
    .screen {
      position: absolute;
      inset: 0;
      min-height: 100vh;
      padding: 44px 20px 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transform: translateY(18px);
      transition: opacity 0.38s ease, transform 0.38s ease;
    }
    .screen.active {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }
    #screen-result {
      justify-content: flex-start;
      padding-top: 36px;
      overflow-y: auto;
      position: relative;
    }
    #screen-result.active { position: relative; }

    /* ── Card ── */
    .card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 36px 28px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }

    /* ── Typography ── */
    .eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 14px;
    }
    .display {
      font-size: 38px;
      font-weight: 800;
      line-height: 1.15;
      background: var(--grad-gold);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }
    .body-md {
      font-size: 15px;
      line-height: 1.85;
      color: var(--text-2);
    }

    /* ── Buttons ── */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 17px 24px;
      border-radius: var(--r-md);
      border: none;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: filter 0.2s, transform 0.15s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .btn:active { transform: scale(0.97); }

    .btn-cta {
      background: var(--grad-cta);
      color: #fff;
      box-shadow: 0 8px 28px rgba(140,100,210,0.28);
    }
    .btn-cta:hover { filter: brightness(1.08); box-shadow: 0 10px 36px rgba(140,100,210,0.38); }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-2);
      margin-top: 12px;
      font-size: 14px;
    }
    .btn-ghost:hover { border-color: var(--gold-dim); color: var(--text); }

    /* ── Landing ── */
    .hero-icon {
      font-size: 68px;
      display: block;
      text-align: center;
      margin-bottom: 28px;
      filter: drop-shadow(0 0 24px rgba(212,168,92,0.45));
    }
    .hero-desc { margin-bottom: 28px; }
    .meta-row {
      display: flex;
      gap: 0;
      margin-top: 18px;
    }
    .meta-row span {
      flex: 1;
      text-align: center;
      font-size: 12px;
      color: var(--text-3);
      border-right: 1px solid var(--border);
      padding: 0 4px;
    }
    .meta-row span:last-child { border-right: none; }

    /* ── Progress ── */
    .progress-wrap { width: 100%; margin-bottom: 18px; }
    .progress-top {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--text-2);
      margin-bottom: 10px;
    }
    .progress-track {
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--grad-cta);
      border-radius: 2px;
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    }

    /* ── Options ── */
    .question {
      font-size: 19px;
      font-weight: 600;
      line-height: 1.6;
      color: var(--text);
      margin-bottom: 28px;
    }
    .opt {
      display: block;
      width: 100%;
      padding: 18px 44px 18px 20px;
      border-radius: var(--r-md);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 15px;
      line-height: 1.55;
      text-align: left;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, opacity 0.25s, transform 0.15s;
      margin-bottom: 12px;
      position: relative;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .opt:last-of-type { margin-bottom: 0; }
    .opt:hover { border-color: var(--gold-dim); background: rgba(212,168,92,0.06); }
    .opt:active { transform: scale(0.99); }
    .opt.selected {
      border-color: var(--gold);
      background: rgba(212,168,92,0.12);
      pointer-events: none;
    }
    .opt.selected::after {
      content: '✓';
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gold);
      font-size: 14px;
      font-weight: 700;
    }
    .opt.fade-out { opacity: 0.25; pointer-events: none; }

    /* ── Loading ── */
    .loading-wrap { text-align: center; }
    .loading-icon {
      font-size: 60px;
      display: block;
      margin-bottom: 24px;
      animation: float 2.2s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0) rotate(-4deg); }
      50%      { transform: translateY(-12px) rotate(4deg); }
    }
    .loading-label {
      font-size: 16px;
      color: var(--text-2);
      animation: breathe 1.8s ease-in-out infinite;
    }
    @keyframes breathe {
      0%,100% { opacity: 0.35; }
      50%      { opacity: 1; }
    }
    .loading-dots::after {
      content: '';
      animation: dot3 1.8s steps(4,end) infinite;
    }
    @keyframes dot3 {
      0%  { content: ''; }
      25% { content: '·'; }
      50% { content: '··'; }
      75% { content: '···'; }
    }

    /* ── Result ── */
    .r-badge {
      display: inline-flex;
      align-items: center;
      padding: 5px 15px;
      border-radius: 20px;
      border: 1px solid rgba(212,168,92,0.45);
      background: rgba(212,168,92,0.08);
      color: var(--gold-hi);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 3px;
      margin-bottom: 18px;
    }
    .r-title {
      font-size: 30px;
      font-weight: 800;
      line-height: 1.2;
      background: var(--grad-gold);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .r-subtitle {
      font-size: 14px;
      color: var(--text-2);
      line-height: 1.6;
      margin-bottom: 22px;
    }
    .r-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 22px;
    }
    .tag {
      padding: 5px 13px;
      border-radius: 20px;
      background: rgba(160,127,212,0.1);
      border: 1px solid rgba(160,127,212,0.25);
      font-size: 12px;
      font-weight: 500;
      color: var(--purple);
    }
    .r-desc {
      font-size: 15px;
      line-height: 2;
      color: var(--text);
    }
    .divider { height: 1px; background: var(--border); margin: 24px 0; }
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 24px;
    }
    .detail-cell {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 14px;
    }
    .detail-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 7px;
    }
    .detail-val {
      font-size: 13px;
      color: var(--text-2);
      line-height: 1.65;
    }
    .share-lbl {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 10px;
    }
    .share-box {
      background: rgba(255,255,255,0.025);
      border: 1px dashed rgba(255,255,255,0.1);
      border-radius: var(--r-sm);
      padding: 18px;
      font-size: 14px;
      line-height: 1.9;
      color: var(--text-2);
      white-space: pre-line;
      user-select: text;
      -webkit-user-select: text;
      margin-bottom: 20px;
    }

    @media (max-width: 390px) {
      .card      { padding: 28px 18px; }
      .display   { font-size: 32px; }
      .question  { font-size: 17px; }
      .r-title   { font-size: 26px; }
      .opt       { font-size: 14px; padding: 16px 40px 16px 18px; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ══ 首页 ══ -->
  <div id="screen-landing" class="screen active">
    <span class="hero-icon">🍷</span>
    <div class="card">
      <div class="eyebrow">酒品人格测试</div>
      <div class="display">你是哪杯酒？</div>
      <div class="hero-desc">
        <p class="body-md">12 个问题，找到属于你的那瓶微醺。每杯酒都有自己的性格，就像你一样。</p>
        <p class="body-md" style="margin-top:10px;margin-bottom:0;">无需注册，测完即得，可分享给朋友对比。</p>
      </div>
      <button class="btn btn-cta" onclick="startQuiz()">开始调酒 →</button>
      <div class="meta-row">
        <span>共 12 题</span>
        <span>约 2 分钟</span>
        <span>16 种结果</span>
      </div>
    </div>
  </div>

  <!-- ══ 答题 ══ -->
  <div id="screen-quiz" class="screen">
    <div class="progress-wrap">
      <div class="progress-top">
        <span id="prog-num">1 / 12</span>
        <span id="prog-pct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="prog-bar" style="width:0%"></div>
      </div>
    </div>
    <div class="card">
      <p class="question" id="q-text"></p>
      <button class="opt" id="opt-0" onclick="pick(0)"></button>
      <button class="opt" id="opt-1" onclick="pick(1)"></button>
    </div>
  </div>

  <!-- ══ 过渡 ══ -->
  <div id="screen-loading" class="screen">
    <div class="loading-wrap">
      <span class="loading-icon">🍸</span>
      <p class="loading-label">正在为你调制专属酒单<span class="loading-dots"></span></p>
    </div>
  </div>

  <!-- ══ 结果 ══ -->
  <div id="screen-result" class="screen">
    <div class="card">
      <div class="r-badge" id="r-mbti">ENFP</div>
      <div class="r-title"    id="r-title"></div>
      <div class="r-subtitle" id="r-subtitle"></div>
      <div class="r-tags"     id="r-tags"></div>
      <p   class="r-desc"     id="r-desc"></p>
      <div class="divider"></div>
      <div class="detail-grid">
        <div class="detail-cell">
          <div class="detail-label">社交风格</div>
          <div class="detail-val" id="r-social"></div>
        </div>
        <div class="detail-cell">
          <div class="detail-label">爱情风格</div>
          <div class="detail-val" id="r-love"></div>
        </div>
      </div>
      <div class="share-lbl">分享文案</div>
      <div class="share-box" id="r-share"></div>
      <button class="btn btn-cta"   id="btn-copy" onclick="copyShare()">复制分享文案</button>
      <button class="btn btn-ghost" onclick="resetQuiz()">重新测试</button>
    </div>
  </div>

</div>
<script>
/* ─────────────────────────────────────────
   题目数据  12 道
───────────────────────────────────────── */

    ]
  },
  {
    q: "酒吧出了一款本周限定特调，你会：",
    opts: [
      { t: "先确认有没有自己不喜欢的成分，再决定", v: "S" },
      { t: "「限定」两个字就够了，不试怎么知道",   v: "N" }
    ]
  },
  {
    q: "喝酒喝到情绪涌上来，你更容易：",
    opts: [
      { t: "复盘一下今天哪里出了问题，喝完想清楚再走", v: "T" },
      { t: "心里话全说出来，就算明天后悔也无所谓",     v: "F" }

    q: "酒喝得差不多了，你会：",

      { t: "主动说「最后一杯」，时间到了就起身走", v: "J" },
      { t: "「再一杯」是口头禅，反正也睡不着",     v: "P" }
    ]
  }
];

/* ─────────────────────────────────────────
   State
───────────────────────────────────────── */
let idx    = 0;
let scores = {};
let locked = false;

/* ─────────────────────────────────────────
   Screen helper
───────────────────────────────────────── */
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'instant' });
}

/* ─────────────────────────────────────────
   Quiz
───────────────────────────────────────── */
function startQuiz() {
  idx    = 0;
  scores = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };
  locked = false;
  renderQ();
  show('screen-quiz');
}

function renderQ() {
  const q   = QS[idx];
  const tot = QS.length;
  const pct = Math.round((idx / tot) * 100);

  document.getElementById('q-text').textContent  = q.q;
  document.getElementById('opt-0').textContent   = q.opts[0].t;
  document.getElementById('opt-1').textContent   = q.opts[1].t;
  document.getElementById('prog-num').textContent = `${idx + 1} / ${tot}`;
  document.getElementById('prog-pct').textContent = `${pct}%`;
  document.getElementById('prog-bar').style.width = `${pct}%`;

  ['opt-0','opt-1'].forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('selected','fade-out');
  });
  locked = false;
}

function pick(i) {
  if (locked) return;
  locked = true;

  const sel = document.getElementById(`opt-${i}`);
  const oth = document.getElementById(`opt-${i === 0 ? 1 : 0}`);
  sel.classList.add('selected');
  oth.classList.add('fade-out');

  scores[QS[idx].opts[i].v]++;

  setTimeout(() => {
    idx++;
    if (idx >= QS.length) {
      show('screen-loading');
      setTimeout(() => {
        const type = calcType();
        renderResult(type);
        show('screen-result');
      }, 2100);
    } else {
      renderQ();
    }
  }, 390);
}

/* ─────────────────────────────────────────
   MBTI calc  — tie goes to first letter (E/S/T/J)
───────────────────────────────────────── */
function calcType() {
  return (scores.E >= scores.I ? 'E' : 'I')
       + (scores.S >= scores.N ? 'S' : 'N')
       + (scores.T >= scores.F ? 'T' : 'F')
       + (scores.J >= scores.P ? 'J' : 'P');
}

/* ─────────────────────────────────────────
   Result render
───────────────────────────────────────── */
function renderResult(type) {
  const d = RS[type] || RS['ENFP'];

  document.getElementById('r-mbti').textContent    = type;
  document.getElementById('r-title').textContent   = d.title;
  document.getElementById('r-subtitle').textContent = d.subtitle;
  document.getElementById('r-desc').textContent    = d.desc;
  document.getElementById('r-social').textContent  = d.social;
  document.getElementById('r-love').textContent    = d.love;
  document.getElementById('r-share').textContent   = d.share;

  const tagsEl = document.getElementById('r-tags');
  tagsEl.innerHTML = '';
  d.tags.forEach(t => {
    const s = document.createElement('span');
    s.className   = 'tag';
    s.textContent = t;
    tagsEl.appendChild(s);
  });

  document.getElementById('btn-copy').textContent = '复制分享文案';
}

/* ─────────────────────────────────────────
   Copy share text
───────────────────────────────────────── */
function copyShare() {
  const text = document.getElementById('r-share').textContent;
  const btn  = document.getElementById('btn-copy');

  const done = () => {
    btn.textContent = '已复制 ✓';
    setTimeout(() => { btn.textContent = '复制分享文案'; }, 2500);
  };

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(done).catch(() => legacyCopy(text, done));
  } else {
    legacyCopy(text, done);
  }
}

function legacyCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none;';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); cb(); } catch(e) {
    document.getElementById('btn-copy').textContent = '请手动复制';
  }
  document.body.removeChild(ta);
}

/* ─────────────────────────────────────────
   Reset
───────────────────────────────────────── */
function resetQuiz() {
  show('screen-landing');
}
